<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
    <div class="container mt-4">
        <div class="mb-3">
            <a href="/" class="btn btn-outline-secondary btn-sm">&larr; Back to Home</a>
        </div>

        <table class="table">
            <tr><td style="text-align: center; font-weight: bold; font-size: 25px;">PLAYFAIR CIPHER</td></tr>
            
            <tr><td style="font-weight: bold; color: blue">ENCRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/playfair/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input type="text" class="form-control" name="inputPlainText" placeholder="Input Plain Text" value="{{ original_plain_text if original_plain_text else '' }}" required autofocus/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="text" class="form-control" name="inputKeyPlain" placeholder="Input Key (e.g. MONARCHY)" value="{{ key_plain if key_plain else '' }}" required/>
                        </div>
                        <button type="submit" class="btn btn-primary mb-3">Encrypt</button>
                        
                        <div class="mb-3">
                            <label class="form-label" style="font-weight: bold; color: #495057;">Encrypted Result:</label>
                            <input type="text" class="form-control" placeholder="Ket Qua" value="{{ encrypted_text if encrypted_text else '' }}" readonly/>
                        </div>
                    </form>
                </td>
            </tr>

            <tr><td style="font-weight: bold; color: blue">DECRYPTION</td></tr>
            <tr>
                <td>
                    <form method="POST" action="/playfair/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input type="text" class="form-control" name="inputCipherText" placeholder="Input Cipher Text" value="{{ original_cipher_text if original_cipher_text else '' }}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input type="text" class="form-control" name="inputKeyCipher" placeholder="Input Key" value="{{ key_cipher if key_cipher else '' }}" required/>
                        </div>
                        <button type="submit" class="btn btn-success mb-3">Decrypt</button>
                        
                        <div class="mb-3">
<label class="form-label" style="font-weight: bold; color: #495057;">Decrypted Result:</label>
                            <input type="text" class="form-control" placeholder="Ket Qua" value="{{ decrypted_text if decrypted_text else '' }}" readonly/>
                        </div>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
